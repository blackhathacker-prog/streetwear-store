<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tariqees | Streetwear Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <h1>TARIQEES</h1>
        <p>Premium Streetwear & Sneakers</p>
        <a href="#shop">Explore Collection</a>
    </header>

    <section class="info">
        <div class="box">🚚 Fast Delivery</div>
        <div class="box">💯 Original Inspired Style</div>
        <div class="box">📲 Easy WhatsApp Orders</div>
    </section>

    <section id="shop" class="products">

        <h2>🔥 Featured Drops</h2>

        <div class="grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" />
                <h3>Nike Air Force 1</h3>
                <p>KES 6,500</p>
                <button onclick="order('Nike Air Force 1')">Order Now</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" />
                <h3>Jordan Retro</h3>
                <p>KES 8,000</p>
                <button onclick="order('Jordan Retro')">Order Now</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1528701800489-20be3c1eaac7" />
                <h3>Street Hoodie</h3>
                <p>KES 2,500</p>
                <button onclick="order('Street Hoodie')">Order Now</button>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 Tariqees. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
