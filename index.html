<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StreetWear KE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🔥 StreetWear KE</h1>
        <p>Fresh Sneakers & Urban Fashion</p>
    </header>

    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Sneaker">
            <h2>Nike Air Force</h2>
            <p>KES 6,500</p>
            <button onclick="order('Nike Air Force')">Order</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Hoodie">
            <h2>Black Hoodie</h2>
            <p>KES 2,500</p>
            <button onclick="order('Black Hoodie')">Order</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
