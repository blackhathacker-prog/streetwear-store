<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StreetWear KE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <h1>🔥 StreetWear KE</h1>
        <p>Premium Sneakers & Urban Fashion</p>
        <a href="#shop">Shop Now</a>
    </header>

    <section id="shop" class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" />
            <h2>Nike Air Force 1</h2>
            <p>KES 6,500</p>
            <button onclick="order('Nike Air Force 1')">Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" />
            <h2>Jordan Retro</h2>
            <p>KES 8,000</p>
            <button onclick="order('Jordan Retro')">Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1528701800489-20be3c1eaac7" />
            <h2>Street Hoodie</h2>
            <p>KES 2,500</p>
            <button onclick="order('Street Hoodie')">Order</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
